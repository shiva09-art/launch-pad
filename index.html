<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  signOut,
  onAuthStateChanged,
  reload
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB5_86-5HiNIYfQTw6VsmiW-Btbk34JoG4",
  authDomain: "launch-pad-8c255.firebaseapp.com",
  projectId: "launch-pad-8c255",
  storageBucket: "launch-pad-8c255.firebasestorage.app",
  messagingSenderId: "130042558203",
  appId: "1:130042558203:web:e50ed33b932bd696c0225e",
  measurementId: "G-HGL3P8FN1Q"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ===== EXISTING UI =====
const form = document.getElementById("contactForm");
const successBanner = document.getElementById("successBanner");

// ===== ADD AUTH UI =====
form.insertAdjacentHTML("beforebegin", `
<div style="border:1px solid #eee;padding:20px;border-radius:12px;margin-bottom:20px;">
  <h3>Email Verification</h3>

  <input id="authEmail" placeholder="Email" style="width:100%;padding:10px;margin-bottom:8px;">
  <input id="authPassword" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:8px;">

  <button id="signupBtn" style="width:100%;margin-bottom:6px;">Sign Up</button>
  <button id="loginBtn" style="width:100%;margin-bottom:6px;">Login</button>
  <button id="resendBtn" style="width:100%;display:none;margin-bottom:6px;">Resend Verification</button>
  <button id="logoutBtn" style="width:100%;display:none;">Logout</button>

  <p id="authStatus" style="font-size:12px;color:#666;margin-top:10px;">
    Verify email to unlock form
  </p>
</div>
`);

const email = document.getElementById("authEmail");
const pass = document.getElementById("authPassword");
const signupBtn = document.getElementById("signupBtn");
const loginBtn = document.getElementById("loginBtn");
const resendBtn = document.getElementById("resendBtn");
const logoutBtn = document.getElementById("logoutBtn");
const status = document.getElementById("authStatus");

// ===== LOCK FORM =====
function lockForm() {
  form.style.opacity = "0.4";
  form.style.pointerEvents = "none";
}

function unlockForm() {
  form.style.opacity = "1";
  form.style.pointerEvents = "auto";
}

lockForm();

// ===== AUTH LOGIC =====

// SIGNUP
signupBtn.onclick = async () => {
  try {
    const user = await createUserWithEmailAndPassword(auth, email.value, pass.value);
    await sendEmailVerification(user.user);
    status.innerText = "Verification email sent. Check inbox.";
  } catch (e) {
    alert(e.message);
  }
};

// LOGIN
loginBtn.onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, pass.value);
  } catch (e) {
    alert(e.message);
  }
};

// RESEND
resendBtn.onclick = async () => {
  await sendEmailVerification(auth.currentUser);
  status.innerText = "Verification email sent again.";
};

// LOGOUT
logoutBtn.onclick = async () => {
  await signOut(auth);
};

// STATE CHANGE
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    lockForm();
    signupBtn.style.display = "block";
    loginBtn.style.display = "block";
    resendBtn.style.display = "none";
    logoutBtn.style.display = "none";
    status.innerText = "Login + verify email";
    return;
  }

  await reload(user);

  signupBtn.style.display = "none";
  loginBtn.style.display = "none";
  logoutBtn.style.display = "block";

  if (user.emailVerified) {
    unlockForm();
    resendBtn.style.display = "none";
    status.innerText = "✅ Verified. You can submit.";
  } else {
    lockForm();
    resendBtn.style.display = "block";
    status.innerText = "❌ Verify email first.";
  }
});

// ===== FORM SUBMIT =====

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!auth.currentUser || !auth.currentUser.emailVerified) {
    alert("Verify email first");
    return;
  }

  const data = new FormData(form);
  data.append("verified_email", auth.currentUser.email);

  const res = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: { Accept: "application/json" }
  });

  if (res.ok) {
    form.reset();
    successBanner.style.display = "block";
  } else {
    alert("Error submitting form");
  }
});
</script>
